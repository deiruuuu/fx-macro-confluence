name: Errante to Discord

# Scrapes Errante Pulse market-analysis and posts new articles to a Discord webhook.
# State (errante-state.json) is committed so posts never repeat.

on:
  schedule:
    - cron: "*/15 * * * *"    # every 15 minutes
  workflow_dispatch: {}         # manual "Run workflow"

permissions:
  contents: write               # to commit errante-state.json

concurrency:                    # never let two runs overlap and double-post
  group: errante-discord
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape Errante and post new items to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node errante-discord.js

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain errante-state.json)" ]; then
            git add errante-state.json
            git commit -m "chore: update Errante->Discord state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
