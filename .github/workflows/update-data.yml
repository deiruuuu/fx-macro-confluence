name: Update dashboard data

# Refreshes data.json from FRED + Reuters news, then commits it so
# GitHub Pages serves the latest numbers. No server needed.

on:
  schedule:
    # FRED publishes daily closes, so a few weekday runs is plenty.
    - cron: "30 13 * * 1-5"    # 13:30 UTC weekdays (after US morning data drops)
    - cron: "30 22 * * 1-5"    # 22:30 UTC weekdays (after US close)
  workflow_dispatch: {}         # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write              # needed to commit data.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch FRED data + Reuters headlines
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # the only secret needed
        run: node fetch-data.js

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json)" ]; then
            git add data.json
            git commit -m "chore: refresh dashboard data [skip ci]"
            git push
          else
            echo "No data changes."
          fi
